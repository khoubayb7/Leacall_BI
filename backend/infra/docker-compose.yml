services:
  postgres:
    image: postgres:16
    container_name: bi_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bi_system}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bi_system}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
